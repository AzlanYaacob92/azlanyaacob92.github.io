<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemculator — Chemistry Learning Suite</title>
<meta name="description" content="Chemculator: a growing suite of interactive chemistry tools. Chemculate concentrations, limiting reactants, and more.">

<!-- Flash-free theme init: must run before first paint, before styles.css
     is even parsed, so returning visitors never see a light-mode flash
     before dark mode kicks in. Mirrors the pattern used in
     concentrationtrainer and stoichiomathics. -->
<script>
(function () {
  try {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  } catch (e) { /* localStorage unavailable — fall back to light mode */ }
})();
</script>

<link rel="stylesheet" href="styles.css">
</head>
<body>

<button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" type="button">🌙</button>

<header class="site-header">
  <span class="eyebrow">Chemistry Learning Suite</span>
  <h1 class="site-title">
    <img src="logo-light.svg" alt="Chemculator" class="site-logo site-logo--light">
    <img src="logo-dark.svg" alt="Chemculator" class="site-logo site-logo--dark">
  </h1>
</header>

<main>
  <div id="intro" class="intro">
    <p class="intro-title" id="intro-title"></p>
    <p class="intro-subtitle" id="intro-subtitle"></p>
  </div>

  <div id="main-content" hidden>
    <p class="hero-lead anim-hero-in">Pick what you want to chemculate.</p>

    <div id="app-grid" class="choice-grid" aria-live="polite">
      <!-- Cards are rendered here by app.js from apps.json -->
      <p class="loading-note">Loading tools…</p>
    </div>
  </div>
</main>

<footer class="site-footer">
  Chemculator is a growing collection of self-study chemistry tools. Each tool
  is designed to be worked through independently — <b>Learn</b> the method,
  <b>Practise</b> it, then <b>Verify</b> your own answer.
</footer>

<script src="app.js"></script>
</body>
</html>
